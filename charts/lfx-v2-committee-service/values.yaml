    compression: true
    # replicas is the number of replicas for the KV bucket
    replicas: 1

  # stream_committee_member_events is the JetStream stream for committee member domain events.
  # Subjects capture created, updated, and deleted; the consumer filters to created and deleted only.
  stream_committee_member_events:
    # creation controls whether the stream CRD is provisioned by this chart
    creation: true
    # keep preserves the stream during helm uninstall to avoid message loss
    keep: true
    # name is the NATS stream name
    name: committee-member-events
    # subjects captures all committee member domain events published by this service and peer services
    subjects:
      - lfx.committee-api.committee_member.*
    # storage is the storage backend for the stream
    storage: file
    # retention keeps messages up to maxAge; they are not accumulated indefinitely
    retention: limits
    # maxAge is the maximum age of a message before it is removed
    maxAge: 24h
    # maxBytes is unlimited; maxAge is the primary eviction mechanism
    maxBytes: -1
    # maxMsgs is unlimited; maxAge is the primary eviction mechanism
    maxMsgs: -1
    # replicas matches the NATS cluster size for durability
    replicas: 3
    # compression reduces storage cost for JSON payloads
    compression: s2

  # stream_weekly_brief_events is the JetStream stream backing the durable async
  # weekly-brief generate workflow (generate-requested events).
  stream_weekly_brief_events:
    # creation controls whether the stream CRD is provisioned by this chart
    creation: true
    # keep preserves the stream during helm uninstall so in-flight work is not lost
    keep: true
    # name is the NATS stream name
    name: weekly-brief-events
    # subjects captures the weekly-brief generation events published by this service
    subjects:
      - lfx.committee-api.weekly_brief.*
    # storage is the storage backend for the stream
    storage: file
    # retention keeps messages up to maxAge
    retention: limits
    # maxAge bounds how long an unprocessed generate request is retained
    maxAge: 24h
    # maxBytes is unlimited; maxAge is the primary eviction mechanism
    maxBytes: -1
    # maxMsgs is unlimited; maxAge is the primary eviction mechanism
    maxMsgs: -1
    # replicas matches the NATS cluster size for durability
    replicas: 3
    # compression reduces storage cost for JSON payloads
    compression: s2

  # object_store_committee_documents is the configuration for the Object Store for storing committee document files
  object_store_committee_documents:
    # creation is a boolean to determine if the Object Store should be created via the helm chart.
    # set it to false if you want to use an existing Object Store.
    creation: true
    # keep is a boolean to determine if the Object Store should be preserved during helm uninstall
    # set it to false if you want the store to be deleted when the chart is uninstalled
    keep: true
    # name is the name of the Object Store for storing committee document files
    name: committee-documents
    # storage is the storage type for the Object Store
    storage: file
    # maxBytes is the maximum total size of the Object Store across all stored files
    maxBytes: 10737418240  # 10GB

# openfga is the configuration for the OpenFGA server
openfga:
  # enabled is a boolean to determine if the OpenFGA server should be enabled for authorization
  # Note: If it is disabled, then the committee service will allow all requests
  # (Disabling OpenFGA should only be used for local development).
  enabled: true

# heimdall is the configuration for the heimdall middleware
heimdall:
  enabled: true
  url: http://lfx-platform-heimdall.lfx.svc.cluster.local:4456
  # jwksUrl is the URL to the JSON Web Key Set endpoint for JWT validation
  jwksUrl: http://lfx-platform-heimdall.lfx.svc.cluster.local:4457/.well-known/jwks
  # add_middleware determines whether or not the middleware is installed. If not managed
  # by another service or helm chart then it is needed.
  add_middleware: false

# authelia is the configuration for the Authelia server
authelia:
  # enabled is a boolean to determine if the Authelia authenticator is enabled
  # Note: Disabling Authelia should only be used for local development
  enabled: true

# app is the configuration for the application.
#
# Container env vars are defined as a single map under `app.environment`; each
# entry is either `{ value: <string> }` or `{ valueFrom: <kube ref> }`. This
# matches the org-wide chart pattern (see lfx-v2-meeting-service) and keeps
# secrets out of plain values — credentials live in a Kubernetes Secret and are
# pulled via `valueFrom.secretKeyRef`.
app:
  # use_oidc_contextualizer is a boolean to determine if the OIDC contextualizer should be used
  use_oidc_contextualizer: true
  # audience is the intended JWT audience. Also referenced by ruleset.yaml, so
  # it lives at the top of `app:` and is mirrored into app.environment.JWT_AUDIENCE
  # below. If you override one, override both.
  audience: lfx-v2-committee-service

  # extraEnv allows injecting additional environment variables into the container.
  # Supports both simple key-value pairs and Kubernetes field references.
  # These are rendered BEFORE OTEL variables, allowing use in OTEL configuration.
  extraEnv: []

  # environment is the full set of container env vars. Each entry is either
  #   FOO:
  #     value: "..."
  # or
  #   FOO:
  #     valueFrom:
  #       secretKeyRef:
  #         name: ...
  #         key: ...
  environment:
    # NATS_URL — mirrors .Values.nats.url. Override both if you change one.
    NATS_URL:
      value: nats://lfx-platform-nats.lfx.svc.cluster.local:4222
    # LOG_LEVEL — debug, info, warn, error
    LOG_LEVEL:
      value: debug
    # LOG_ADD_SOURCE — include source file/line in log records
    LOG_ADD_SOURCE:
      value: "true"
    # JWKS_URL — mirrors .Values.heimdall.jwksUrl. Override both if you change one.
    JWKS_URL:
      value: http://lfx-platform-heimdall.lfx.svc.cluster.local:4457/.well-known/jwks
    # JWT_AUDIENCE — mirrors .Values.app.audience (used by ruleset.yaml).
    JWT_AUDIENCE:
      value: lfx-v2-committee-service
    # EMAILS_ENABLED gates outbound role-notification emails to LFID users.
    EMAILS_ENABLED:
      value: "false"
    # INVITES_ENABLED gates outbound invite requests for non-LFID users.
    INVITES_ENABLED:
      value: "false"
    # AI_SOURCE selects the AI adapter: "fake" (default when unset; safe for
    # local dev / CI / fresh installs without LiteLLM credentials) or "live"
    # (requires LITELLM_BASE_URL, LITELLM_API_KEY, LITELLM_MODEL — startup
    # fails fast if any are missing in "live" mode).
    AI_SOURCE:
      value: ""
    # LITELLM_BASE_URL — required when AI_SOURCE=live.
    LITELLM_BASE_URL:
      value: ""
    # LITELLM_API_KEY — sourced from a Kubernetes Secret. Operators must
    # provision the secret (or override `name`/`key`) before installing the
    # chart in environments that use the live adapter.
    LITELLM_API_KEY:
      valueFrom:
        secretKeyRef:
          name: committee-secrets
          key: litellm_api_key
    # LITELLM_MODEL — e.g. "anthropic/claude-sonnet-4".
    LITELLM_MODEL:
      value: ""
    # M2M_AUTH_CLIENT_ID — required for the live query-service sources.
    M2M_AUTH_CLIENT_ID:
      value: ""
    # M2M_AUTH_PRIVATE_KEY — RSA private key in PEM format used to sign the
    # Auth0 client-assertion JWT (RS256). Sourced from a Kubernetes Secret;
    # operators must provision the secret (or override `name`/`key`). Using a
    # keypair instead of a shared client_secret keeps the credential out of
    # the token endpoint payload entirely.
    M2M_AUTH_PRIVATE_KEY:
      valueFrom:
        secretKeyRef:
          name: committee-secrets
          key: m2m_private_key
    # M2M_AUTH_DOMAIN — Auth0 domain (e.g. "linuxfoundation-dev.auth0.com").
    # NOT a full URL — just the host. The SDK constructs the token endpoint.
    M2M_AUTH_DOMAIN:
      value: ""
    # M2M_AUTH_AUDIENCE — optional.
    M2M_AUTH_AUDIENCE:
      value: ""
    # QUERY_SERVICE_URL — base URL for meeting / mailing-list / vote sources.
    # When empty, those sources return no results.
    QUERY_SERVICE_URL:
      value: ""
    # QUERY_MAILING_LIST_TYPE — overrides the query-service resource type the
    # mailing-list source queries (defaults to m2m.DefaultMailingListType).
    QUERY_MAILING_LIST_TYPE:
      value: ""
    # QUERY_VOTE_TYPE — overrides the query-service resource type the vote
    # source queries (defaults to m2m.DefaultVoteType).
    QUERY_VOTE_TYPE:
      value: ""

  # otel is the configuration for OpenTelemetry tracing
  otel:
    # serviceName is the service name for OpenTelemetry resource identification
    # (default: "lfx-v2-committee-service")
    serviceName: ""
    # serviceVersion is the service version for OpenTelemetry resource identification
    # (default: build-time Version variable)
    serviceVersion: ""
    # protocol specifies the OTLP protocol: "grpc" or "http"
    # (default: "grpc")
    protocol: "grpc"
    # endpoint is the OTLP collector endpoint
    # For gRPC: typically "host:4317", for HTTP: typically "host:4318"
    endpoint: ""
    # insecure disables TLS for the OTLP connection
    # Set to "true" for in-cluster communication without TLS
    insecure: "false"
    # tracesExporter specifies the traces exporter: "otlp" or "none"
    # (default: "none")
    tracesExporter: "none"
    # tracesSampler specifies the OTEL_TRACES_SAMPLER type. Supported values:
    # "always_on", "always_off", "traceidratio", "parentbased_always_on",
    # "parentbased_always_off", "parentbased_traceidratio".
    # When empty, the application defaults to parentbased_traceidratio.
    tracesSampler: ""
    # tracesSamplerArg specifies the OTEL_TRACES_SAMPLER_ARG (sampler ratio or parent_sampler_arg).
    # Required for "traceidratio" and "parentbased_traceidratio" samplers.
    # (default: "")
    tracesSamplerArg: ""
    # metricsExporter specifies the metrics exporter: "otlp" or "none"
    # (default: "none")
    metricsExporter: "none"
    # logsExporter specifies the logs exporter: "otlp" or "none"
    # (default: "none")
    logsExporter: "none"
    # propagators specifies the trace context propagators to use
    # Comma-separated list of: "tracecontext", "baggage", "jaeger"
    # (default: "tracecontext,baggage")
    propagators: "tracecontext,baggage,jaeger"

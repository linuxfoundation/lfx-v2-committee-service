    keep: true
    # name is the name of the KV bucket for storing committee document metadata
    name: committee-documents-metadata
    # history is the number of history entries to keep for each key — used for optimistic locking (ETag/If-Match)
    history: 20
    # storage is the storage type for the KV bucket
    storage: file
    # maxValueSize is the maximum size of a single metadata entry (document metadata JSON)
    maxValueSize: 10485760  # 10MB
    # maxBytes is the maximum total size of the KV bucket
    maxBytes: 1073741824  # 1GB

    keep: true
    # name is the name of the KV bucket for weekly-brief throttle counters
    name: group-weekly-brief-throttle
    # history is the number of history entries to keep for each key — used for CAS on the throttle counter
    history: 20
    # storage is the storage type for the KV bucket
    storage: file
    # maxValueSize is the maximum size of a value in the KV bucket (throttle counter JSON)
    maxValueSize: 10485760  # 10MB
    # maxBytes is the maximum total size of the KV bucket
    maxBytes: 1073741824  # 1GB

---
# Local development values override file.
# Copy this file to values.local.yaml and customize as needed.
# values.local.yaml is gitignored so your local settings won't be committed.
#
# Usage:
#   cp charts/lfx-v2-committee-service/values.local.example.yaml \
#      charts/lfx-v2-committee-service/values.local.yaml
#   make helm-install-local

# Image configuration
image:
  repository: ghcr.io/linuxfoundation/lfx-v2-committee-service/committee-api
  tag: "latest" # Overrides appVersion from Chart.yaml
  pullPolicy: Never

app:
  environment:
    # ORG_SEAT_PAGE_TOKEN_HMAC_KEY signs the Org Lens committee-seat pagination
    # cursor (LFXV2-1865). There is no in-repo fallback, so the org-seat read
    # endpoint returns 503 until this is set. Provide any stable random string for
    # local development (it does not need to match other environments).
    ORG_SEAT_PAGE_TOKEN_HMAC_KEY:
      value: "local-dev-org-seat-cursor-key-change-me"

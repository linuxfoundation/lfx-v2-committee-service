---
{{- if .Values.nats.stream_committee_member_events.creation }}
apiVersion: jetstream.nats.io/v1beta2
kind: Stream
metadata:
  name: {{ .Values.nats.stream_committee_member_events.name }}
  namespace: {{ .Release.Namespace }}
  {{- if .Values.nats.stream_committee_member_events.keep }}
  annotations:
    "helm.sh/resource-policy": keep
  {{- end }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
spec:
  name: {{ .Values.nats.stream_committee_member_events.name }}
  subjects:
  {{- range .Values.nats.stream_committee_member_events.subjects }}
    - {{ . }}
  {{- end }}
  storage: {{ .Values.nats.stream_committee_member_events.storage }}
  retention: {{ .Values.nats.stream_committee_member_events.retention }}
  maxAge: {{ .Values.nats.stream_committee_member_events.maxAge }}
  maxBytes: {{ .Values.nats.stream_committee_member_events.maxBytes }}
  maxMsgs: {{ .Values.nats.stream_committee_member_events.maxMsgs }}
  replicas: {{ .Values.nats.stream_committee_member_events.replicas }}
  compression: {{ .Values.nats.stream_committee_member_events.compression }}
  duplicateWindow: 2m
{{- end }}

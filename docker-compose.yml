services:
  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "--store_dir=/data", "--name=local"]
    volumes:
      - nats-data:/data

volumes:
  nats-data:

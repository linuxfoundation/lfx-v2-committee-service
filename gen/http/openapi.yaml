            updated_at:
                type: string
                description: The timestamp when the resource was last updated (read-only)
                example: "2023-06-20T14:45:30Z"
                format: date-time
            uploaded_by_name:
                type: string
                description: Display name of the uploader (client-provided)
                example: Alex Lee
            uploaded_by_uid:
                type: string
                description: LF username of the uploader (auto-populated from JWT)
                example: alexlee
        example:
            committee_uid: 7cad5a8d-19d0-41a4-81a6-043453daf9ee
            content_type: application/pdf
            created_at: "2023-01-15T10:30:00Z"
            description: Technical architecture decisions for Q1 2025
            file_name: architecture-decisions-q1-2025.pdf
            file_size: 204800
            name: Architecture Decision Record
            uid: d1e2f3a4-b5c6-7890-defa-123456789012
            updated_at: "2023-06-20T14:45:30Z"
            uploaded_by_name: Alex Lee
            uploaded_by_uid: alexlee

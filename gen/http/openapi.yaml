                description: Optional description
                example: Technical architecture decisions for Q1 2025
                maxLength: 2000
            file_name:
                type: string
                description: Original file name
                example: architecture-decisions-q1-2025.pdf
                maxLength: 500
            file_size:
                type: integer
                description: File size in bytes
                example: 204800
                format: int64
                minimum: 0
            name:
                type: string
                description: Display name for the document
                example: Architecture Decision Record
                maxLength: 500
            uid:
                type: string
                description: Document UID
                example: d1e2f3a4-b5c6-7890-defa-123456789012

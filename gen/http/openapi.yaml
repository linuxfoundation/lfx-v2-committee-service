definitions:
    BadRequestError:
        title: BadRequestError
        type: object
        properties:
            message:
                type: string
                description: Error message
                example: The request was invalid.
        description: Bad request
        example:
            message: The request was invalid.
        required:
            - message
    CommitteeApplicationWithReadonlyAttributes:
        title: CommitteeApplicationWithReadonlyAttributes
        type: object
        properties:
            applicant_email:
                type: string
                description: Applicant email address
                example: user@example.com
            committee_uid:
                type: string
                description: Committee UID
                example: 7cad5a8d-19d0-41a4-81a6-043453daf9ee
                format: uuid
            created_at:
                type: string
                description: The timestamp when the resource was created (read-only)
                example: "2023-01-15T10:30:00Z"
                format: date-time
            message:
                type: string
                description: Application message from the applicant
                example: I would like to join the TSC to contribute my expertise.
                maxLength: 2000
            reviewer_notes:
                type: string
                description: Notes from the reviewer
                example: Approved based on contribution history.
                maxLength: 2000
            status:
                type: string
                description: Application status
                default: pending
                example: pending
                enum:
                    - pending
                    - approved
                    - rejected
            uid:
                type: string
                description: Application UID
                example: b2c3d4e5-f6a7-8901-bcde-f12345678901
                format: uuid
        example:
            applicant_email: user@example.com
            committee_uid: 7cad5a8d-19d0-41a4-81a6-043453daf9ee
            created_at: "2023-01-15T10:30:00Z"
            message: I would like to join the TSC to contribute my expertise.
            reviewer_notes: Approved based on contribution history.
            status: pending
            uid: b2c3d4e5-f6a7-8901-bcde-f12345678901
    CommitteeBaseWithReadonlyAttributes:
        title: CommitteeBaseWithReadonlyAttributes
        type: object
        properties:
            calendar:
                type: object
                properties:
                    public:
                        type: boolean
                        description: Whether the committee calendar is publicly visible
                        default: false
                        example: true
                description: Settings related to the committee calendar
                example:
                    public: true
            category:
                type: string
                description: The category of the committee
                example: Technical Steering Committee
                enum:
                    - Ambassador
                    - Board
                    - Code of Conduct
                    - Committers
                    - Expert Group
                    - Finance Committee
                    - Government Advisory Council
                    - Legal Committee
                    - Maintainers
                    - Marketing Committee/Sub Committee
                    - Marketing Mailing List
                    - Marketing Oversight Committee/Marketing Advisory Committee
                    - Other
                    - Product Security
                    - Special Interest Group
                    - Technical Advisory Committee
                    - Technical Mailing List
                    - Technical Oversight Committee
                    - Technical Steering Committee
                    - Working Group
            chat_channel:
                type: string
                description: The chat channel URL or identifier for the committee
                example: https://slack.example.org/channels/tsc
                maxLength: 500
            description:
                type: string
                description: The description of the committee
                example: Main technical oversight committee for the project
                maxLength: 2000
            display_name:
                type: string
                description: The display name of the committee
                example: TSC Committee Calendar
                maxLength: 100
            enable_voting:
                type: boolean
                description: Whether voting is enabled for this committee
                default: false
                example: true
            join_mode:
                type: string
                description: How new members can join this committee
                default: invite_only
                example: open
                enum:
                    - open
                    - invite_only
                    - application
                    - closed
            mailing_list:
                type: string
                description: The mailing list email address for the committee
                example: tsc@lists.example.org
                format: email
            name:
                type: string
                description: The name of the committee
                example: Technical Steering Committee
                maxLength: 100
            parent_uid:
                type: string
                description: The UID of the parent committee -- v2 uid, not related to v1 id directly, should be empty if there is none
                example: 90b147f2-7cdd-157a-a2f4-9d4a567123fc
                format: uuid
            project_name:
                type: string
                description: The name of the project this committee belongs to
                example: Linux Foundation Project
                maxLength: 100
            project_uid:
                type: string
                description: Project UID this committee belongs to -- v2 uid, not related to v1 id directly
                example: 7cad5a8d-19d0-41a4-81a6-043453daf9ee
                format: uuid
            public:
                type: boolean
                description: General committee visibility/access permissions
                default: false
                example: true
            requires_review:
                type: boolean
                description: Whether this committee is expected to be reviewed
                default: false
                example: true
            sso_group_enabled:
                type: boolean
                description: Whether SSO group integration is enabled
                default: false
                example: true
            sso_group_name:
                type: string
                description: The name of the SSO group - read-only
                example: lfx-committee-group
            total_members:
                type: integer
                description: The total number of members in this committee
                example: 15
                format: int64
                minimum: 0
            total_voting_repos:
                type: integer
                description: The total number of repositories with voting permissions for this committee
                example: 3
                format: int64
                minimum: 0
            uid:
                type: string
                description: Committee UID -- v2 uid, not related to v1 id directly
                example: 7cad5a8d-19d0-41a4-81a6-043453daf9ee
                format: uuid
            website:
                type: string
                description: The website URL of the committee
                example: https://committee.example.org
                format: uri
                pattern: ^(https?://)?[^\s/$.?#].[^\s]*$
        description: A base representation of LFX committees with readonly attributes.
        example:
            calendar:
                public: true
            category: Technical Steering Committee
            chat_channel: https://slack.example.org/channels/tsc
            description: Main technical oversight committee for the project
            display_name: TSC Committee Calendar
            enable_voting: true
            join_mode: open
            mailing_list: tsc@lists.example.org
            name: Technical Steering Committee
            parent_uid: 90b147f2-7cdd-157a-a2f4-9d4a567123fc
            project_name: Linux Foundation Project
            project_uid: 7cad5a8d-19d0-41a4-81a6-043453daf9ee
            public: true
            requires_review: true
            sso_group_enabled: true
            sso_group_name: lfx-committee-group
            total_members: 15
            total_voting_repos: 3
            uid: 7cad5a8d-19d0-41a4-81a6-043453daf9ee
            website: https://committee.example.org
    CommitteeDocumentWithReadonlyAttributes:
        title: CommitteeDocumentWithReadonlyAttributes
        type: object
        properties:
            committee_uid:
                type: string
                description: Committee UID
                example: 7cad5a8d-19d0-41a4-81a6-043453daf9ee
                format: uuid
            content_type:
                type: string
                description: MIME type of the file
                example: application/pdf
            created_at:
                type: string
                description: The timestamp when the resource was created (read-only)
                example: "2023-01-15T10:30:00Z"
                format: date-time
            description:
